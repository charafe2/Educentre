services:

  php-fpm:
    volumes:
      - ./backend:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: true
      LOG_LEVEL: debug

  queue-worker:
    volumes:
      - ./backend:/var/www/html
      - ./docker/supervisor/supervisord.queue.conf:/etc/supervisor/supervisord.queue.conf:ro

  reverb:
    volumes:
      - ./backend:/var/www/html
      - ./docker/supervisor/supervisord.reverb.conf:/etc/supervisor/supervisord.reverb.conf:ro

  nginx:
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - mailpit

  mailpit:
    image: axllent/mailpit:latest
    container_name: saas-mailpit
    restart: unless-stopped
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    networks:
      - saas-network
