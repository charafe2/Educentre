services:

  postgres:
    image: postgres:16-alpine
    container_name: saas-postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: ${DB_DATABASE:-saas_erp}
      POSTGRES_USER: ${DB_USERNAME:-saas_erp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-saas_erp} -d ${DB_DATABASE:-saas_erp}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - saas-network

  redis:
    image: redis:7-alpine
    container_name: saas-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saas-network

  php-fpm:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: saas-php-fpm
    restart: unless-stopped
    volumes:
      - storage_data:/var/www/html/storage
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-saas_erp}
      DB_USERNAME: ${DB_USERNAME:-saas_erp}
      DB_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
      BROADCAST_CONNECTION: reverb
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-null}
      FILESYSTEM_DISK: local
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST:-mailpit}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@saaserp.com}
      REVERB_APP_ID: ${REVERB_APP_ID}
      REVERB_APP_KEY: ${REVERB_APP_KEY}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      REVERB_HOST: 0.0.0.0
      REVERB_PORT: 8080
      REVERB_SCHEME: ${REVERB_SCHEME:-http}
      VITE_REVERB_APP_KEY: ${REVERB_APP_KEY}
      VITE_REVERB_HOST: localhost
      VITE_REVERB_PORT: ${REVERB_PORT:-8080}
      VITE_REVERB_SCHEME: ${REVERB_SCHEME:-http}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - saas-network

  queue-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: saas-queue-worker
    restart: unless-stopped
    command: ["supervisord", "-c", "/etc/supervisor/supervisord.queue.conf"]
    volumes:
      - storage_data:/var/www/html/storage
      - ./docker/supervisor/supervisord.queue.conf:/etc/supervisor/supervisord.queue.conf:ro
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-saas_erp}
      DB_USERNAME: ${DB_USERNAME:-saas_erp}
      DB_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - saas-network

  reverb:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: saas-reverb
    restart: unless-stopped
    command: ["supervisord", "-c", "/etc/supervisor/supervisord.reverb.conf"]
    volumes:
      - storage_data:/var/www/html/storage
      - ./docker/supervisor/supervisord.reverb.conf:/etc/supervisor/supervisord.reverb.conf:ro
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-saas_erp}
      DB_USERNAME: ${DB_USERNAME:-saas_erp}
      DB_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-null}
      CACHE_STORE: redis
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: ${REVERB_APP_ID}
      REVERB_APP_KEY: ${REVERB_APP_KEY}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      REVERB_HOST: 0.0.0.0
      REVERB_PORT: 8080
      REVERB_SCHEME: ${REVERB_SCHEME:-http}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - saas-network

  nginx:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: saas-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - storage_data:/var/www/html/storage:ro
    depends_on:
      - php-fpm
      - reverb
    networks:
      - saas-network

volumes:
  postgres_data:
  redis_data:
  storage_data:

networks:
  saas-network:
    driver: bridge
