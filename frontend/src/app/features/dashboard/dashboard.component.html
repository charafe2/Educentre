<div class="dashboard-container">
  <mat-card class="welcome-card">
    <mat-card-header>
      <mat-card-title>Welcome to SaaS ERP</mat-card-title>
      <mat-card-subtitle>Tutoring Center Management System</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <p>Your comprehensive solution for managing students, planning, finance, and communications.</p>
    </mat-card-content>
  </mat-card>

  <div class="stats-grid">
    <mat-card class="stat-card">
      <mat-card-content>
        <div class="stat-icon">
          <mat-icon>people</mat-icon>
        </div>
        <div class="stat-content">
          <h3>0</h3>
          <p>Total Students</p>
        </div>
      </mat-card-content>
    </mat-card>

    <mat-card class="stat-card">
      <mat-card-content>
        <div class="stat-icon">
          <mat-icon>event</mat-icon>
        </div>
        <div class="stat-content">
          <h3>0</h3>
          <p>Today's Sessions</p>
        </div>
      </mat-card-content>
    </mat-card>

    <mat-card class="stat-card">
      <mat-card-content>
        <div class="stat-icon">
          <mat-icon>payments</mat-icon>
        </div>
        <div class="stat-content">
          <h3>0</h3>
          <p>Monthly Revenue</p>
        </div>
      </mat-card-content>
    </mat-card>

    <mat-card class="stat-card">
      <mat-card-content>
        <div class="stat-icon">
          <mat-icon>notifications</mat-icon>
        </div>
        <div class="stat-content">
          <h3>0</h3>
          <p>Pending Tasks</p>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
