<div class="main-layout">
  <mat-sidenav-container class="sidenav-container">
    <!-- Sidebar Navigation -->
    <mat-sidenav 
              #sidenav
              [opened]="opened"
              [mode]="isHandset ? 'over' : 'side'"
              [fixedInViewport]="isHandset"
              class="sidebar">
      <div class="sidebar-header">
        <div class="tenant-info">
          <mat-icon class="tenant-icon">business</mat-icon>
          <div class="tenant-details">
            <h3>{{ tenantName }}</h3>
            <p class="tenant-id">{{ tenantId || 'Unknown' }}</p>
          </div>
        </div>
      </div>
      
      <mat-nav-list class="nav-list">
        <a mat-list-item 
           *ngFor="let item of navigationItems" 
           [routerLink]="tenantService.getTenantUrl(item.route)"
           routerLinkActive="active-link"
           class="nav-item">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      </mat-nav-list>

      <div class="sidebar-footer">
        <button mat-icon-button 
                (click)="logout()"
                class="logout-button"
                matTooltip="Logout">
          <mat-icon>logout</mat-icon>
        </button>
      </div>
    </mat-sidenav>

    <!-- Main Content Area -->
    <mat-sidenav-content class="main-content">
      <!-- Top Toolbar -->
      <mat-toolbar class="top-toolbar">
        <button mat-icon-button 
                (click)="toggleSidebar()"
                class="menu-toggle"
                *ngIf="isHandset">
          <mat-icon>menu</mat-icon>
        </button>
        
        <div class="toolbar-content">
          <h1 class="page-title">{{ getRouteTitle() }}</h1>
          <div class="toolbar-actions">
            <!-- Notifications -->
            <button mat-icon-button 
                    class="action-button"
                    matTooltip="Notifications">
              <mat-icon>notifications</mat-icon>
            </button>
            
            <!-- User Profile -->
            <button mat-icon-button 
                    class="action-button"
                    matTooltip="Profile">
              <mat-icon>account_circle</mat-icon>
            </button>
          </div>
        </div>
      </mat-toolbar>

      <!-- Router Outlet for Feature Content -->
      <main class="content-area">
        <router-outlet></router-outlet>
      </main>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
